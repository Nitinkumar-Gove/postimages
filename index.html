<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostImages Gallery</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #eee;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      margin-bottom: 24px;
      color: #aaa;
    }

    #gallery {
      width: 100%;
      max-width: 960px;
    }

    /* Main viewer */
    #viewer {
      position: relative;
      background: #1a1a1a;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 420px;
      margin-bottom: 16px;
    }

    #main-img {
      max-width: 100%;
      max-height: 60vh;
      object-fit: contain;
      display: block;
      transition: opacity 0.2s;
    }

    #main-img.fade { opacity: 0; }

    /* Nav buttons */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.55);
      border: none;
      color: #fff;
      font-size: 1.6rem;
      width: 44px;
      height: 64px;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      z-index: 2;
    }
    .nav-btn:hover { background: rgba(0,0,0,0.85); }
    #btn-prev { left: 10px; }
    #btn-next { right: 10px; }

    /* Counter */
    #counter {
      position: absolute;
      bottom: 10px;
      right: 14px;
      font-size: 0.78rem;
      color: #888;
      background: rgba(0,0,0,0.5);
      padding: 2px 8px;
      border-radius: 4px;
    }

    /* Image name */
    #img-name {
      position: absolute;
      bottom: 10px;
      left: 14px;
      font-size: 0.78rem;
      color: #aaa;
      background: rgba(0,0,0,0.5);
      padding: 2px 8px;
      border-radius: 4px;
      max-width: 60%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Copy URL button */
    #copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.55);
      border: none;
      color: #ccc;
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    #copy-btn:hover { background: rgba(60,120,255,0.7); color: #fff; }

    /* Thumbnails */
    #thumbs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .thumb {
      width: 80px;
      height: 60px;
      object-fit: cover;
      border-radius: 5px;
      cursor: pointer;
      opacity: 0.55;
      border: 2px solid transparent;
      transition: opacity 0.15s, border-color 0.15s;
    }
    .thumb:hover { opacity: 0.85; }
    .thumb.active {
      opacity: 1;
      border-color: #4a8fff;
    }

    /* State messages */
    #status {
      color: #666;
      font-size: 0.9rem;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <h1>PostImages</h1>
  <div id="gallery" style="display:none">
    <div id="viewer">
      <button class="nav-btn" id="btn-prev">&#8249;</button>
      <img id="main-img" src="" alt="" />
      <button class="nav-btn" id="btn-next">&#8250;</button>
      <button id="copy-btn" title="Copy image URL">&#128279; Copy URL</button>
      <span id="img-name"></span>
      <span id="counter"></span>
    </div>
    <div id="thumbs"></div>
  </div>
  <p id="status">Loading images…</p>

  <script>
    const REPO = 'nitinkumar-gove/postimages';
    const BASE_URL = `https://nitinkumar-gove.github.io/postimages/`;
    const IMAGE_EXT = /\.(jpe?g|png|gif|webp|svg|bmp|avif)$/i;

    const gallery = document.getElementById('gallery');
    const mainImg = document.getElementById('main-img');
    const thumbsEl = document.getElementById('thumbs');
    const counter = document.getElementById('counter');
    const imgName = document.getElementById('img-name');
    const status = document.getElementById('status');
    const copyBtn = document.getElementById('copy-btn');

    let images = [];
    let current = 0;

    async function loadImages() {
      try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/`);
        if (!res.ok) throw new Error(`GitHub API ${res.status}`);
        const files = await res.json();
        images = files
          .filter(f => f.type === 'file' && IMAGE_EXT.test(f.name))
          .map(f => f.name)
          .sort();
        if (images.length === 0) {
          status.textContent = 'No images found in this repository.';
          return;
        }
        buildThumbs();
        show(0);
        gallery.style.display = '';
        status.style.display = 'none';
      } catch (e) {
        status.textContent = `Failed to load images: ${e.message}`;
      }
    }

    function buildThumbs() {
      thumbsEl.innerHTML = '';
      images.forEach((name, i) => {
        const img = document.createElement('img');
        img.className = 'thumb';
        img.src = BASE_URL + name;
        img.alt = name;
        img.title = name;
        img.dataset.index = i;
        img.addEventListener('click', () => show(i));
        thumbsEl.appendChild(img);
      });
    }

    function show(idx) {
      if (images.length === 0) return;
      idx = (idx + images.length) % images.length;
      current = idx;

      mainImg.classList.add('fade');
      setTimeout(() => {
        mainImg.src = BASE_URL + images[idx];
        mainImg.alt = images[idx];
        mainImg.onload = () => mainImg.classList.remove('fade');
      }, 150);

      imgName.textContent = images[idx];
      counter.textContent = `${idx + 1} / ${images.length}`;

      document.querySelectorAll('.thumb').forEach((t, i) => {
        t.classList.toggle('active', i === idx);
      });

      // Scroll active thumb into view
      const active = thumbsEl.children[idx];
      if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }

    document.getElementById('btn-prev').addEventListener('click', () => show(current - 1));
    document.getElementById('btn-next').addEventListener('click', () => show(current + 1));

    copyBtn.addEventListener('click', () => {
      const url = BASE_URL + images[current];
      navigator.clipboard.writeText(url).then(() => {
        const orig = copyBtn.textContent;
        copyBtn.textContent = '✓ Copied!';
        setTimeout(() => { copyBtn.textContent = orig; }, 1800);
      });
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft')  show(current - 1);
      if (e.key === 'ArrowRight') show(current + 1);
    });

    loadImages();
  </script>
</body>
</html>
